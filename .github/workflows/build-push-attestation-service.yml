name: Attestation Service

on:
  push:
    branches:
      - main
    paths:
      - "services/attestation-service/**"
  pull_request:
    paths:
      - "services/attestation-service/**"
  # for manual trigger from GitHub UI
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: concrete-security/shade-attestation-service

jobs:
  ruff-lint-format:
    runs-on: ubuntu-latest
    name: Ruff check
    steps:
      - uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4

      - name: Install uv
        uses: astral-sh/setup-uv@2ddd2b9cb38ad8efd50337e8ab201519a34c9f24 # v7

      - name: Install dependencies
        working-directory: ./services/attestation-service
        run: |
          uv sync --dev

      - name: Run Ruff linter
        working-directory: ./services/attestation-service
        run: |
          uv run ruff check .

      - name: Run Ruff formatter check
        working-directory: ./services/attestation-service
        run: |
          uv run ruff format --check .

  build-and-test:
    name: Build and Test Docker Image
    runs-on: ubuntu-latest
    needs: ruff-lint-format
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3

      - name: Build Docker image for testing
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6
        with:
          context: ./services/attestation-service
          file: ./services/attestation-service/Dockerfile
          push: false
          tags: attestation-service:test
          load: true

      - name: Start attestation service container
        run: |
          # Start the container in detached mode
          docker run -d --name attestation-service-test -p 8080:8080 \
            -e EKM_SHARED_SECRET=dev-mode-ekm-placeholder-not-for-production \
            attestation-service:test

      - name: Install uv
        uses: astral-sh/setup-uv@2ddd2b9cb38ad8efd50337e8ab201519a34c9f24 # v7

      - name: Run tests
        run: |
          cd services/attestation-service
          make test-api

      - name: Stop and remove test container
        if: always()
        run: |
          docker container logs attestation-service-test || true
          docker stop attestation-service-test || true
          docker rm attestation-service-test || true

  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: build-and-test
    permissions:
      contents: read
      packages: write
    outputs:
      image-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout code
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3

      - name: Log in to Container Registry
        uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Tags and Labels
        id: meta
        uses: docker/metadata-action@c1e51972afc2121e065aed6d45c65596fe445f3f # v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha
            type=ref,event=branch
            type=ref,event=pr
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6
        with:
          context: ./services/attestation-service
          file: ./services/attestation-service/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Generate artifact summary
        run: |
          echo "### Docker Image Built Successfully! 🐳" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Tags:** \`${{ steps.meta.outputs.tags }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Digest:** \`${{ steps.build.outputs.digest }}\`" >> $GITHUB_STEP_SUMMARY

  provenance:
    needs: [build-and-push]
    permissions:
      actions: read # for detecting the Github Actions environment.
      id-token: write # for creating OIDC tokens for signing.
      packages: write # for uploading attestations.
    # See https://github.com/slsa-framework/slsa-github-generator/issues/358
    if: ${{ github.event_name != 'pull_request' }}
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_container_slsa3.yml@v2.1.0
    with:
      image: ${{ needs.build-and-push.outputs.image-name }}
      digest: ${{ needs.build-and-push.outputs.image-digest }}
      registry-username: ${{ github.actor }}
      private-repository: true
    secrets:
      registry-password: ${{ secrets.GITHUB_TOKEN }}

  update-digest:
    name: Update Digest References
    needs: [build-and-push, provenance]
    if: always() && needs.build-and-push.result == 'success' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4

      - name: Update versions.py and docker-compose.yml digest
        run: |
          python .github/scripts/update_versions_digest.py \
            --service-key attestation-service \
            --image-ref "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ needs.build-and-push.outputs.image-digest }}"

      - name: Open digest update PR
        uses: peter-evans/create-pull-request@22a9089034f40e5a961c8808d113e2c98fb63676 # v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(ci): update attestation-service digest"
          title: "chore(ci): update attestation-service digest"
          body: |
            Automated digest update for `${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}`.
            - Digest: `${{ needs.build-and-push.outputs.image-digest }}`
            - Run: `${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`
          branch: automation/shade-attestation-service-digest
          delete-branch: true
          labels: ci
